<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veralex Amazon | We Build and Manage Your Amazon FBA Business</title>
<meta name="description" content="Veralex Amazon — We build and manage your Amazon FBA business from market research to growth, for clients worldwide, with the account fully in your name.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p900:#241127; --p800:#33163A; --p700:#451F4B; --p600:#67316E; --p500:#8F469B;
  --orange:#F36E24; --orange-l:#FF9457;
  --bg-light:#FBF8FC; --bg-lilac:#F4EDF6; --paper:#fff;
  --ink:#231827; --ink-soft:#6F6472; --line:rgba(69,31,75,.12);
  --r:20px; --r-lg:30px; --maxw:1240px; --ease:cubic-bezier(.19,.72,.28,1);
  --shadow-sm:0 3px 14px rgba(69,31,75,.08);
  --shadow-md:0 18px 46px rgba(69,31,75,.14);
  --shadow-lg:0 34px 80px rgba(36,17,39,.22);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Manrope','Tajawal',sans-serif;background:var(--paper);color:var(--ink);line-height:1.75;overflow-x:hidden;-webkit-font-smoothing:antialiased}
[dir="ltr"] body{font-family:'Manrope','Tajawal',sans-serif}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none}
.wrap{max-width:var(--maxw);margin-inline:auto;padding-inline:clamp(18px,4vw,40px)}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:.8rem;letter-spacing:.05em;color:var(--orange);text-transform:uppercase}
.eyebrow::before{content:"";width:24px;height:2px;background:var(--orange);border-radius:2px}
h1,h2,h3,h4{font-weight:900;line-height:1.25}
.title{font-size:clamp(1.7rem,3.4vw,2.5rem);margin:12px 0 16px}
.lead{color:var(--ink-soft);font-size:1.03rem;max-width:640px}
.on-dark{color:#fff}.on-dark .lead{color:rgba(255,255,255,.72)}

/* progress */
#progress{position:fixed;top:0;inset-inline-start:0;height:3px;width:0%;background:linear-gradient(90deg,var(--orange),var(--p500));z-index:2000;transition:width .1s linear}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 30px;border-radius:999px;font-weight:800;font-size:.98rem;transition:transform .3s var(--ease),box-shadow .3s var(--ease),background .3s}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 14px 30px rgba(243,110,36,.35)}
.btn-primary:hover{background:var(--orange-l);transform:translateY(-3px)}
.btn-light{background:#fff;color:var(--p700)}
.btn-light:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.btn-outline{border:1.5px solid rgba(255,255,255,.35);color:#fff}
.btn-outline:hover{background:rgba(255,255,255,.1)}

/* reveal */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}}

/* header */
header{position:fixed;inset-inline:0;top:0;z-index:900;padding:22px 0;transition:.4s var(--ease)}
header.scrolled{padding:12px 0;background:rgba(36,17,39,.82);backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:inline-flex;align-items:center;background:#fff;padding:6px 14px;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.brand img{height:32px;display:block}
.nav-links{display:flex;gap:4px}
.nav-links a{font-weight:700;font-size:.92rem;color:rgba(255,255,255,.85);padding:9px 14px;border-radius:999px;transition:.25s}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.12);color:#fff}
.nav-actions{display:flex;align-items:center;gap:10px}
.lang-btn{font-weight:800;font-size:.8rem;color:#fff;border:1.5px solid rgba(255,255,255,.3);padding:8px 14px;border-radius:999px}
.lang-btn:hover{background:rgba(255,255,255,.1)}
.nav-cta{padding:11px 22px;font-size:.88rem}
.burger{display:none;flex-direction:column;gap:5px;padding:8px}
.burger span{width:22px;height:2px;background:#fff;border-radius:2px}
.mobile-panel{position:fixed;inset:0;z-index:1500;background:var(--p900);transform:translateY(-100%);transition:.5s var(--ease);display:flex;flex-direction:column;padding:90px 30px 40px;gap:6px}
.mobile-panel.show{transform:translateY(0)}
.mobile-panel a{color:#fff;font-weight:800;font-size:1.3rem;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.mobile-close{position:absolute;top:24px;inset-inline-end:24px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center}
@media(max-width:900px){.nav-links,.nav-cta{display:none}.burger{display:flex}}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;color:#fff;padding-top:100px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;object-position:75% 30%;transform:scale(1.06)}
.hero-bg::after{content:"";position:absolute;inset:0;background:
  linear-gradient(90deg, rgba(36,17,39,.96) 0%, rgba(69,31,75,.88) 46%, rgba(69,31,75,.28) 100%)}
.hero-glow{position:absolute;z-index:1;top:-10%;inset-inline-start:-8%;width:55%;height:60%;background:radial-gradient(circle,rgba(143,70,155,.35),transparent 65%);filter:blur(50px);animation:floaty 14s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translate(0,0)}50%{transform:translate(24px,30px)}}
.hero-dots{position:absolute;inset:0;z-index:1;opacity:.5;pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:660px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);padding:8px 18px;border-radius:999px;font-size:.82rem;font-weight:700;margin-bottom:26px;backdrop-filter:blur(6px)}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--orange)}
.hero h1{font-size:clamp(2rem,4.6vw,3.2rem);margin-bottom:20px}
.hero h1 .hl{color:var(--orange-l);white-space:nowrap;display:inline-block}
.hero-lead{font-size:1.06rem;color:rgba(255,255,255,.8);max-width:54ch;margin-bottom:30px}
.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:38px}
.trust-mini{display:flex;flex-wrap:wrap;gap:10px 22px;margin-bottom:44px}
.trust-mini span{display:flex;align-items:center;gap:8px;font-size:.85rem;color:rgba(255,255,255,.75);font-weight:600}
.trust-mini svg{width:16px;height:16px;stroke:var(--orange-l);flex-shrink:0}
.hero-stats{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.14);padding-top:28px}
.hstat{flex:1;padding-inline-end:20px}
.hstat b{display:block;font-size:clamp(1.3rem,2.2vw,1.7rem);font-weight:900;color:#fff}
.hstat span{font-size:.78rem;color:rgba(255,255,255,.6);font-weight:600}
.scroll-cue{position:absolute;bottom:22px;inset-inline-start:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.5);font-size:.72rem}
.scroll-cue .ln{width:1px;height:30px;background:linear-gradient(180deg,rgba(255,255,255,.6),transparent);animation:scrl 2s ease-in-out infinite}
@keyframes scrl{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

/* section shells */
section{position:relative}
.sec{padding:110px 0}
.bg-light{background:linear-gradient(180deg,#fff 0%,var(--bg-lilac) 100%)}
.bg-dark{background:linear-gradient(135deg,var(--p900) 0%,var(--p700) 52%,var(--p600) 100%);color:#fff}
.bg-darker{background:linear-gradient(160deg,#1a0a1c,var(--p900));color:#fff}
.center{text-align:center;margin-inline:auto}

/* audience bento */
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:190px;gap:22px;margin-top:54px}
.bcard{position:relative;border-radius:var(--r);padding:30px;background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;transition:transform .4s var(--ease),box-shadow .4s var(--ease),border-color .4s}
.bcard:hover{transform:translateY(-8px);box-shadow:var(--shadow-md);border-color:rgba(243,110,36,.4)}
.bcard .bignum{position:absolute;top:6px;inset-inline-end:16px;font-size:4.2rem;font-weight:900;color:var(--bg-lilac);z-index:0;line-height:1}
.bcard .ic{width:48px;height:48px;border-radius:14px;background:var(--bg-lilac);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:.4s}
.bcard .ic svg{width:24px;height:24px;stroke:var(--p700);transition:.4s}
.bcard:hover .ic{background:var(--orange)}
.bcard:hover .ic svg{stroke:#fff}
.bcard h3{font-size:1.15rem;margin:16px 0 6px;position:relative;z-index:1}
.bcard p{font-size:.88rem;color:var(--ink-soft);position:relative;z-index:1}
.bc-a{grid-column:span 2;grid-row:span 2}
.bc-b{grid-column:span 2;grid-row:span 1}
.bc-c{grid-column:span 1;grid-row:span 1}
.bc-d{grid-column:span 1;grid-row:span 1}
.bc-a h3{font-size:1.4rem}
@media(max-width:960px){.bento{grid-template-columns:1fr 1fr;grid-auto-rows:auto}.bc-a,.bc-b{grid-column:span 2}.bc-c,.bc-d{grid-column:span 1}}
@media(max-width:600px){.bento{grid-template-columns:1fr}.bc-a,.bc-b,.bc-c,.bc-d{grid-column:span 1}}

/* services sticky */
.svc-wrap{display:grid;grid-template-columns:.95fr 1.05fr;gap:56px;align-items:flex-start;margin-top:54px}
.svc-media{position:sticky;top:110px;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/5}
.svc-media img{width:100%;height:100%;object-fit:cover}
.svc-media .tint{position:absolute;inset:0;background:linear-gradient(160deg,rgba(69,31,75,.55),rgba(36,17,39,.35));mix-blend-mode:multiply}
.svc-media .marker{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 6px rgba(243,110,36,.25);opacity:0;transition:opacity .5s,transform .5s;transform:scale(.5)}
.svc-media .marker.on{opacity:1;transform:scale(1)}
.svc-media .num-badge{position:absolute;bottom:24px;inset-inline-start:24px;color:#fff;font-weight:800;font-size:.85rem;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);padding:9px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.2)}
.svc-item{padding:34px 0;border-bottom:1px solid rgba(255,255,255,.12);opacity:.4;transition:opacity .4s}
.svc-item.active{opacity:1}
.svc-item:first-child{padding-top:0}
.svc-item .tag{font-weight:900;color:var(--orange-l);font-size:.85rem;letter-spacing:.06em}
.svc-item h3{font-size:1.3rem;margin:10px 0 8px}
.svc-item p{color:rgba(255,255,255,.68);font-size:.92rem;max-width:44ch}
@media(max-width:900px){.svc-wrap{grid-template-columns:1fr}.svc-media{position:relative;top:auto;aspect-ratio:16/10}}

/* process timeline */
.timeline{position:relative;margin-top:64px}
.tl-line{position:absolute;top:28px;inset-inline:5%;height:2px;background:var(--line);z-index:0}
.tl-fill{position:absolute;top:0;inset-inline-start:0;height:100%;width:0;background:linear-gradient(90deg,var(--orange),var(--orange-l));transition:width 1.4s var(--ease)}
.tl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;position:relative;z-index:1}
.tl-step{text-align:center}
.tl-dot{width:56px;height:56px;border-radius:50%;background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-weight:900;color:var(--p700);transition:.4s}
.tl-step.active .tl-dot{border-color:var(--orange);background:var(--orange);color:#fff}
.tl-step h4{font-size:.98rem;margin-bottom:6px}
.tl-step p{font-size:.9rem;color:var(--p700);font-weight:500}
@media(max-width:860px){.tl-grid{grid-template-columns:1fr;gap:34px}.tl-line{display:none}}

/* why split */
.why-wrap{display:grid;grid-template-columns:1fr 1.05fr;gap:60px;align-items:center;margin-top:54px}
.why-media{position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/5}
.why-media img{width:100%;height:100%;object-fit:cover}
.why-blob{position:absolute;z-index:-1;border-radius:50%;filter:blur(60px)}
.why-blob.b1{width:260px;height:260px;background:rgba(143,70,155,.35);top:-40px;inset-inline-start:-40px}
.why-blob.b2{width:180px;height:180px;border:2px solid var(--orange);border-radius:50%;bottom:-30px;inset-inline-end:-30px;filter:none;background:none;opacity:.5}
.why-list{display:flex;flex-direction:column}
.why-row{display:flex;gap:20px;padding:26px 0;border-bottom:1px solid var(--line);transition:.3s}
.why-row:first-child{padding-top:0}
.why-row:hover{padding-inline-start:8px}
.why-n{font-weight:900;font-size:1.1rem;color:var(--bg-lilac);width:40px;flex-shrink:0;transition:.3s}
.why-row:hover .why-n{color:var(--orange)}
.why-row h4{font-size:1.05rem;margin-bottom:6px}
.why-row p{font-size:.9rem;color:var(--ink-soft)}
@media(max-width:860px){.why-wrap{grid-template-columns:1fr}.why-media{max-width:480px;margin-inline:auto}}

/* markets */
.map-card{position:relative;border-radius:var(--r-lg);padding:50px 30px;background:radial-gradient(ellipse at center,rgba(143,70,155,.28),transparent 70%);margin-top:50px}
.world-svg{width:100%;height:auto;max-width:820px;margin-inline:auto;display:block}
.world-svg .blob{fill:rgba(255,255,255,.16)}
.route{fill:none;stroke:var(--orange);stroke-width:1.4;stroke-dasharray:5 7;opacity:.85;animation:dash 4s linear infinite}
@keyframes dash{to{stroke-dashoffset:-120}}
.mk{fill:var(--orange)}
.mk-pulse{fill:none;stroke:var(--orange);stroke-width:1.4;opacity:.55;transform-origin:center;animation:pulse 2.6s ease-out infinite}
@keyframes pulse{0%{transform:scale(.4);opacity:.6}100%{transform:scale(2.4);opacity:0}}
.market-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:44px}
.mkcard{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px;text-align:center}
.mkcard b{display:block;font-size:1rem;margin-bottom:4px}
.mkcard span{font-size:.78rem;color:rgba(255,255,255,.6)}
@media(max-width:860px){.market-cards{grid-template-columns:1fr 1fr}}
.mkcard-more{background:rgba(243,110,36,.12);border-color:rgba(243,110,36,.35)}
@media(max-width:600px){
  .map-card{padding:30px 16px;margin-top:32px;border-radius:var(--r)}
  .world-svg{max-width:100%}
  .market-cards{grid-template-columns:1fr 1fr;gap:10px;margin-top:28px}
  .mkcard{padding:12px 8px}
  .mkcard b{font-size:.88rem}
  .mkcard span{font-size:.7rem}
}
@media(max-width:380px){.market-cards{grid-template-columns:1fr}}

/* faq */
.faq{max-width:800px;margin:50px auto 0}
.faq-item{background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;overflow:hidden}
.faq-q{width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 24px;text-align:start;font-weight:800;font-size:1rem;color:var(--p700)}
.faq-plus{width:30px;height:30px;border-radius:50%;background:var(--bg-lilac);position:relative;flex-shrink:0;transition:.3s}
.faq-plus::before,.faq-plus::after{content:"";position:absolute;background:var(--p700);top:50%;inset-inline-start:50%;transition:.3s}
.faq-plus::before{width:12px;height:1.6px;transform:translate(-50%,-50%)}
.faq-plus::after{width:1.6px;height:12px;transform:translate(-50%,-50%)}
.faq-item.open .faq-plus{background:var(--orange)}
.faq-item.open .faq-plus::before,.faq-item.open .faq-plus::after{background:#fff}
.faq-item.open .faq-plus::after{opacity:0}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.faq-a-in{padding:0 24px 22px;color:var(--ink-soft);font-size:.93rem}

/* final cta */
.final{position:relative;padding:70px 0;color:#fff;overflow:hidden}
@media(max-width:760px){.final{padding:56px 0}}
.final .bg{position:absolute;inset:0}
.final .bg img{width:100%;height:100%;object-fit:cover;object-position:25% 40%}
.final .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,rgba(24,10,26,.95) 5%,rgba(36,17,39,.6) 55%,rgba(69,31,75,.25) 100%)}
.final-inner{position:relative;z-index:1;max-width:560px}
.final h2{font-size:clamp(1.8rem,3.6vw,2.6rem);margin-bottom:16px}
.final p{color:rgba(255,255,255,.75);margin-bottom:34px}
.final-actions{display:flex;flex-wrap:wrap;gap:14px}

/* modal form */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(24,10,26,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .35s var(--ease)}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-card{background:var(--bg-light);border-radius:var(--r-lg);max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:40px;position:relative;transform:translateY(20px);transition:transform .35s var(--ease)}
.modal-overlay.show .modal-card{transform:translateY(0)}
.modal-close{position:absolute;top:20px;inset-inline-end:20px;width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center}
.field{position:relative;margin-bottom:18px}
.field input,.field select,.field textarea{width:100%;padding:18px 16px 8px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-family:inherit;font-size:.94rem;transition:.25s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange);outline:none}
.field textarea{min-height:80px;resize:vertical;padding-top:22px}
.field label{position:absolute;top:16px;inset-inline-start:16px;font-size:.9rem;color:var(--ink-soft);transition:.2s;pointer-events:none;background:#fff;padding-inline:2px}
.field input:focus+label,.field input:not(:placeholder-shown)+label,.field textarea:focus+label,.field textarea:not(:placeholder-shown)+label,.field.filled label{top:-8px;font-size:.72rem;color:var(--orange)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.field-row{grid-template-columns:1fr}}
.success-state{text-align:center;padding:30px 10px;display:none}
.success-state.show{display:block}
.success-state svg{width:56px;height:56px;stroke:var(--orange);margin-bottom:16px}

/* footer */
footer{background:var(--p900);color:rgba(255,255,255,.6);padding:60px 0 26px}
.foot-grid{display:grid;grid-template-columns:1.1fr 1fr 1.2fr;gap:32px;padding-bottom:30px;border-bottom:1px solid rgba(255,255,255,.08)}
.foot-col h5{color:#fff;font-size:.95rem;font-weight:800;margin-bottom:16px}
.foot-contact{list-style:none;display:flex;flex-direction:column;gap:12px}
.foot-contact li{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(255,255,255,.65)}
.foot-contact svg{width:16px;height:16px;flex-shrink:0;margin-top:3px;color:var(--orange-l)}
.foot-links{display:flex;flex-direction:column;gap:12px}
.foot-links a{font-size:.85rem;color:rgba(255,255,255,.65)}
.foot-links a:hover{color:var(--orange-l)}
.foot-logo-box{display:inline-flex;align-items:center;background:#fff;padding:6px 14px;border-radius:12px;margin-bottom:14px;width:fit-content;max-width:100%;justify-content:start}
.foot-logo-box img{height:32px;margin-bottom:0;display:block}
.foot-desc{font-size:.82rem;color:rgba(255,255,255,.55);max-width:280px;margin-bottom:16px}
.foot-social{display:flex;gap:10px}
.foot-social a{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff;transition:.3s}
.foot-social a:hover{background:var(--orange)}
.foot-social svg{width:16px;height:16px}
.foot-bottom{padding-top:20px;font-size:.78rem;color:rgba(255,255,255,.4);text-align:center}
@media(max-width:760px){.foot-grid{grid-template-columns:1fr;gap:30px}.foot-brand{align-items:flex-start}}

/* floats */

.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(24,10,26,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .35s var(--ease)}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-card{background:var(--bg-light);border-radius:var(--r-lg);max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:40px;position:relative;transform:translateY(20px);transition:transform .35s var(--ease)}
.modal-overlay.show .modal-card{transform:translateY(0)}
.modal-close{position:absolute;top:20px;inset-inline-end:20px;width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center}
.field{position:relative;margin-bottom:18px}
.field input,.field select,.field textarea{width:100%;padding:18px 16px 8px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-family:inherit;font-size:.94rem;transition:.25s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange);outline:none}
.field textarea{min-height:80px;resize:vertical;padding-top:22px}
.field label{position:absolute;top:16px;inset-inline-start:16px;font-size:.9rem;color:var(--ink-soft);transition:.2s;pointer-events:none;background:#fff;padding-inline:2px}
.field input:focus+label,.field input:not(:placeholder-shown)+label,.field textarea:focus+label,.field textarea:not(:placeholder-shown)+label,.field.filled label{top:-8px;font-size:.72rem;color:var(--orange)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.field-row{grid-template-columns:1fr}}
.success-state{text-align:center;padding:30px 10px;display:none}
.success-state.show{display:block}
.success-state svg{width:56px;height:56px;stroke:var(--orange);margin-bottom:16px}

/* footer */
footer{background:var(--p900);color:rgba(255,255,255,.6);padding:60px 0 26px}
.foot-grid{display:grid;grid-template-columns:1.1fr 1fr 1.2fr;gap:32px;padding-bottom:30px;border-bottom:1px solid rgba(255,255,255,.08)}
.foot-col h5{color:#fff;font-size:.95rem;font-weight:800;margin-bottom:16px}
.foot-contact{list-style:none;display:flex;flex-direction:column;gap:12px}
.foot-contact li{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(255,255,255,.65)}
.foot-contact svg{width:16px;height:16px;flex-shrink:0;margin-top:3px;color:var(--orange-l)}
.foot-links{display:flex;flex-direction:column;gap:12px}
.foot-links a{font-size:.85rem;color:rgba(255,255,255,.65)}
.foot-links a:hover{color:var(--orange-l)}
.foot-logo-box{display:inline-flex;align-items:center;background:#fff;padding:6px 14px;border-radius:12px;margin-bottom:14px;width:fit-content;max-width:100%;justify-self:start}
.foot-logo-box img{height:32px;margin-bottom:0;display:block}
.foot-desc{font-size:.82rem;color:rgba(255,255,255,.55);max-width:280px;margin-bottom:16px}
.foot-social{display:flex;gap:10px}
.foot-social a{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff;transition:.3s}
.foot-social a:hover{background:var(--orange)}
.foot-social svg{width:16px;height:16px}
.foot-bottom{padding-top:20px;font-size:.78rem;color:rgba(255,255,255,.4);text-align:center}
@media(max-width:760px){.foot-grid{grid-template-columns:1fr;gap:30px}.foot-brand{align-items:flex-start}}

/* floats */
.top-btn{position:fixed;bottom:30px;inset-inline-end:26px;z-index:800;width:46px;height:46px;border-radius:50%;background:var(--p700);color:#fff;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;box-shadow:var(--shadow-md)}
.top-btn.show{opacity:1;pointer-events:auto}
.top-btn svg{width:18px;height:18px}

/* mobile bottom bar */
.mobile-bar{display:none;position:fixed;bottom:0;inset-inline:0;z-index:700;background:rgba(36,17,39,.95);backdrop-filter:blur(14px);padding:10px 14px;gap:10px;border-top:1px solid rgba(255,255,255,.08)}
@media(max-width:760px){.mobile-bar{display:flex}body{padding-bottom:74px}.top-btn{bottom:90px}}
.mobile-bar .btn{flex:1;justify-content:center;padding:13px;font-size:.85rem}
</style>

/* progress */
#progress{position:fixed;top:0;inset-inline-start:0;height:3px;width:0%;background:linear-gradient(90deg,var(--orange),var(--p500));z-index:2000;transition:width .1s linear}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 30px;border-radius:999px;font-weight:800;font-size:.98rem;transition:transform .3s var(--ease),box-shadow .3s var(--ease),background .3s}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 14px 30px rgba(243,110,36,.35)}
.btn-primary:hover{background:var(--orange-l);transform:translateY(-3px)}
.btn-light{background:#fff;color:var(--p700)}
.btn-light:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.btn-outline{border:1.5px solid rgba(255,255,255,.35);color:#fff}
.btn-outline:hover{background:rgba(255,255,255,.1)}

/* reveal */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}}

/* header */
header{position:fixed;inset-inline:0;top:0;z-index:900;padding:22px 0;transition:.4s var(--ease)}
header.scrolled{padding:12px 0;background:rgba(36,17,39,.82);backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:inline-flex;align-items:center;background:#fff;padding:6px 14px;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.brand img{height:32px;display:block}
.nav-links{display:flex;gap:4px}
.nav-links a{font-weight:700;font-size:.92rem;color:rgba(255,255,255,.85);padding:9px 14px;border-radius:999px;transition:.25s}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.12);color:#fff}
.nav-actions{display:flex;align-items:center;gap:10px}
.lang-btn{font-weight:800;font-size:.8rem;color:#fff;border:1.5px solid rgba(255,255,255,.3);padding:8px 14px;border-radius:999px}
.lang-btn:hover{background:rgba(255,255,255,.1)}
.nav-cta{padding:11px 22px;font-size:.88rem}
.burger{display:none;flex-direction:column;gap:5px;padding:8px}
.burger span{width:22px;height:2px;background:#fff;border-radius:2px}
.mobile-panel{position:fixed;inset:0;z-index:1500;background:var(--p900);transform:translateY(-100%);transition:.5s var(--ease);display:flex;flex-direction:column;padding:90px 30px 40px;gap:6px}
.mobile-panel.show{transform:translateY(0)}
.mobile-panel a{color:#fff;font-weight:800;font-size:1.3rem;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.mobile-close{position:absolute;top:24px;inset-inline-end:24px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center}
@media(max-width:900px){.nav-links,.nav-cta{display:none}.burger{display:flex}}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;color:#fff;padding-top:100px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;object-position:75% 30%;transform:scale(1.06)}
.hero-bg::after{content:"";position:absolute;inset:0;background:
  linear-gradient(90deg, rgba(36,17,39,.96) 0%, rgba(69,31,75,.88) 46%, rgba(69,31,75,.28) 100%)}
.hero-glow{position:absolute;z-index:1;top:-10%;inset-inline-start:-8%;width:55%;height:60%;background:radial-gradient(circle,rgba(143,70,155,.35),transparent 65%);filter:blur(50px);animation:floaty 14s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translate(0,0)}50%{transform:translate(24px,30px)}}
.hero-dots{position:absolute;inset:0;z-index:1;opacity:.5;pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:660px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);padding:8px 18px;border-radius:999px;font-size:.82rem;font-weight:700;margin-bottom:26px;backdrop-filter:blur(6px)}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--orange)}
.hero h1{font-size:clamp(2rem,4.6vw,3.2rem);margin-bottom:20px}
.hero h1 .hl{color:var(--orange-l);white-space:nowrap;display:inline-block}
.hero-lead{font-size:1.06rem;color:rgba(255,255,255,.8);max-width:54ch;margin-bottom:30px}
.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:38px}
.trust-mini{display:flex;flex-wrap:wrap;gap:10px 22px;margin-bottom:44px}
.trust-mini span{display:flex;align-items:center;gap:8px;font-size:.85rem;color:rgba(255,255,255,.75);font-weight:600}
.trust-mini svg{width:16px;height:16px;stroke:var(--orange-l);flex-shrink:0}
.hero-stats{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.14);padding-top:28px}
.hstat{flex:1;padding-inline-end:20px}
.hstat b{display:block;font-size:clamp(1.3rem,2.2vw,1.7rem);font-weight:900;color:#fff}
.hstat span{font-size:.78rem;color:rgba(255,255,255,.6);font-weight:600}
.scroll-cue{position:absolute;bottom:22px;inset-inline-start:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.5);font-size:.72rem}
.scroll-cue .ln{width:1px;height:30px;background:linear-gradient(180deg,rgba(255,255,255,.6),transparent);animation:scrl 2s ease-in-out infinite}
@keyframes scrl{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

/* section shells */
section{position:relative}
.sec{padding:110px 0}
.bg-light{background:linear-gradient(180deg,#fff 0%,var(--bg-lilac) 100%)}
.bg-dark{background:linear-gradient(135deg,var(--p900) 0%,var(--p700) 52%,var(--p600) 100%);color:#fff}
.bg-darker{background:linear-gradient(160deg,#1a0a1c,var(--p900));color:#fff}
.center{text-align:center;margin-inline:auto}

/* audience bento */
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:190px;gap:22px;margin-top:54px}
.bcard{position:relative;border-radius:var(--r);padding:30px;background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;transition:transform .4s var(--ease),box-shadow .4s var(--ease),border-color .4s}
.bcard:hover{transform:translateY(-8px);box-shadow:var(--shadow-md);border-color:rgba(243,110,36,.4)}
.bcard .bignum{position:absolute;top:6px;inset-inline-end:16px;font-size:4.2rem;font-weight:900;color:var(--bg-lilac);z-index:0;line-height:1}
.bcard .ic{width:48px;height:48px;border-radius:14px;background:var(--bg-lilac);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:.4s}
.bcard .ic svg{width:24px;height:24px;stroke:var(--p700);transition:.4s}
.bcard:hover .ic{background:var(--orange)}
.bcard:hover .ic svg{stroke:#fff}
.bcard h3{font-size:1.15rem;margin:16px 0 6px;position:relative;z-index:1}
.bcard p{font-size:.88rem;color:var(--ink-soft);position:relative;z-index:1}
.bc-a{grid-column:span 2;grid-row:span 2}
.bc-b{grid-column:span 2;grid-row:span 1}
.bc-c{grid-column:span 1;grid-row:span 1}
.bc-d{grid-column:span 1;grid-row:span 1}
.bc-a h3{font-size:1.4rem}
@media(max-width:960px){.bento{grid-template-columns:1fr 1fr;grid-auto-rows:auto}.bc-a,.bc-b{grid-column:span 2}.bc-c,.bc-d{grid-column:span 1}}
@media(max-width:600px){.bento{grid-template-columns:1fr}.bc-a,.bc-b,.bc-c,.bc-d{grid-column:span 1}}

/* services sticky */
.svc-wrap{display:grid;grid-template-columns:.95fr 1.05fr;gap:56px;align-items:flex-start;margin-top:54px}
.svc-media{position:sticky;top:110px;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/5}
.svc-media img{width:100%;height:100%;object-fit:cover}
.svc-media .tint{position:absolute;inset:0;background:linear-gradient(160deg,rgba(69,31,75,.55),rgba(36,17,39,.35));mix-blend-mode:multiply}
.svc-media .marker{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 6px rgba(243,110,36,.25);opacity:0;transition:opacity .5s,transform .5s;transform:scale(.5)}
.svc-media .marker.on{opacity:1;transform:scale(1)}
.svc-media .num-badge{position:absolute;bottom:24px;inset-inline-start:24px;color:#fff;font-weight:800;font-size:.85rem;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);padding:9px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.2)}
.svc-item{padding:34px 0;border-bottom:1px solid rgba(255,255,255,.12);opacity:.4;transition:opacity .4s}
.svc-item.active{opacity:1}
.svc-item:first-child{padding-top:0}
.svc-item .tag{font-weight:900;color:var(--orange-l);font-size:.85rem;letter-spacing:.06em}
.svc-item h3{font-size:1.3rem;margin:10px 0 8px}
.svc-item p{color:rgba(255,255,255,.68);font-size:.92rem;max-width:44ch}
@media(max-width:900px){.svc-wrap{grid-template-columns:1fr}.svc-media{position:relative;top:auto;aspect-ratio:16/10}}

/* process timeline */
.timeline{position:relative;margin-top:64px}
.tl-line{position:absolute;top:28px;inset-inline:5%;height:2px;background:var(--line);z-index:0}
.tl-fill{position:absolute;top:0;inset-inline-start:0;height:100%;width:0;background:linear-gradient(90deg,var(--orange),var(--orange-l));transition:width 1.4s var(--ease)}
.tl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;position:relative;z-index:1}
.tl-step{text-align:center}
.tl-dot{width:56px;height:56px;border-radius:50%;background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-weight:900;color:var(--p700);transition:.4s}
.tl-step.active .tl-dot{border-color:var(--orange);background:var(--orange);color:#fff}
.tl-step h4{font-size:.98rem;margin-bottom:6px}
.tl-step p{font-size:.9rem;color:var(--p700);font-weight:500}
@media(max-width:860px){.tl-grid{grid-template-columns:1fr;gap:34px}.tl-line{display:none}}

/* why split */
.why-wrap{display:grid;grid-template-columns:1fr 1.05fr;gap:60px;align-items:center;margin-top:54px}
.why-media{position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/5}
.why-media img{width:100%;height:100%;object-fit:cover}
.why-blob{position:absolute;z-index:-1;border-radius:50%;filter:blur(60px)}
.why-blob.b1{width:260px;height:260px;background:rgba(143,70,155,.35);top:-40px;inset-inline-start:-40px}
.why-blob.b2{width:180px;height:180px;border:2px solid var(--orange);border-radius:50%;bottom:-30px;inset-inline-end:-30px;filter:none;background:none;opacity:.5}
.why-list{display:flex;flex-direction:column}
.why-row{display:flex;gap:20px;padding:26px 0;border-bottom:1px solid var(--line);transition:.3s}
.why-row:first-child{padding-top:0}
.why-row:hover{padding-inline-start:8px}
.why-n{font-weight:900;font-size:1.1rem;color:var(--bg-lilac);width:40px;flex-shrink:0;transition:.3s}
.why-row:hover .why-n{color:var(--orange)}
.why-row h4{font-size:1.05rem;margin-bottom:6px}
.why-row p{font-size:.9rem;color:var(--ink-soft)}
@media(max-width:860px){.why-wrap{grid-template-columns:1fr}.why-media{max-width:480px;margin-inline:auto}}

/* markets */
.map-card{position:relative;border-radius:var(--r-lg);padding:50px 30px;background:radial-gradient(ellipse at center,rgba(143,70,155,.28),transparent 70%);margin-top:50px}
.world-svg{width:100%;height:auto;max-width:820px;margin-inline:auto;display:block}
.world-svg .blob{fill:rgba(255,255,255,.16)}
.route{fill:none;stroke:var(--orange);stroke-width:1.4;stroke-dasharray:5 7;opacity:.85;animation:dash 4s linear infinite}
@keyframes dash{to{stroke-dashoffset:-120}}
.mk{fill:var(--orange)}
.mk-pulse{fill:none;stroke:var(--orange);stroke-width:1.4;opacity:.55;transform-origin:center;animation:pulse 2.6s ease-out infinite}
@keyframes pulse{0%{transform:scale(.4);opacity:.6}100%{transform:scale(2.4);opacity:0}}
.market-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:44px}
.mkcard{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px;text-align:center}
.mkcard b{display:block;font-size:1rem;margin-bottom:4px}
.mkcard span{font-size:.78rem;color:rgba(255,255,255,.6)}
@media(max-width:860px){.market-cards{grid-template-columns:1fr 1fr}}
.mkcard-more{background:rgba(243,110,36,.12);border-color:rgba(243,110,36,.35)}
@media(max-width:600px){
  .map-card{padding:30px 16px;margin-top:32px;border-radius:var(--r)}
  .world-svg{max-width:100%}
  .market-cards{grid-template-columns:1fr 1fr;gap:10px;margin-top:28px}
  .mkcard{padding:12px 8px}
  .mkcard b{font-size:.88rem}
  .mkcard span{font-size:.7rem}
}
@media(max-width:380px){.market-cards{grid-template-columns:1fr}}

/* faq */
.faq{max-width:800px;margin:50px auto 0}
.faq-item{background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;overflow:hidden}
.faq-q{width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 24px;text-align:start;font-weight:800;font-size:1rem;color:var(--p700)}
.faq-plus{width:30px;height:30px;border-radius:50%;background:var(--bg-lilac);position:relative;flex-shrink:0;transition:.3s}
.faq-plus::before,.faq-plus::after{content:"";position:absolute;background:var(--p700);top:50%;inset-inline-start:50%;transition:.3s}
.faq-plus::before{width:12px;height:1.6px;transform:translate(-50%,-50%)}
.faq-plus::after{width:1.6px;height:12px;transform:translate(-50%,-50%)}
.faq-item.open .faq-plus{background:var(--orange)}
.faq-item.open .faq-plus::before,.faq-item.open .faq-plus::after{background:#fff}
.faq-item.open .faq-plus::after{opacity:0}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.faq-a-in{padding:0 24px 22px;color:var(--ink-soft);font-size:.93rem}

/* final cta */
.final{position:relative;padding:70px 0;color:#fff;overflow:hidden}
@media(max-width:760px){.final{padding:56px 0}}
.final .bg{position:absolute;inset:0}
.final .bg img{width:100%;height:100%;object-fit:cover;object-position:25% 40%}
.final .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,rgba(24,10,26,.95) 5%,rgba(36,17,39,.6) 55%,rgba(69,31,75,.25) 100%)}
.final-inner{position:relative;z-index:1;max-width:560px}
.final h2{font-size:clamp(1.8rem,3.6vw,2.6rem);margin-bottom:16px}
.final p{color:rgba(255,255,255,.75);margin-bottom:34px}
.final-actions{display:flex;flex-wrap:wrap;gap:14px}

/* modal form */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(24,10,26,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .35s var(--ease)}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-card{background:var(--bg-light);border-radius:var(--r-lg);max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:40px;position:relative;transform:translateY(20px);transition:transform .35s var(--ease)}
.modal-overlay.show .modal-card{transform:translateY(0)}
.modal-close{position:absolute;top:20px;inset-inline-end:20px;width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center}
.field{position:relative;margin-bottom:18px}
.field input,.field select,.field textarea{width:100%;padding:18px 16px 8px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-family:inherit;font-size:.94rem;transition:.25s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange);outline:none}
.field textarea{min-height:80px;resize:vertical;padding-top:22px}
.field label{position:absolute;top:16px;inset-inline-start:16px;font-size:.9rem;color:var(--ink-soft);transition:.2s;pointer-events:none;background:#fff;padding-inline:2px}
.field input:focus+label,.field input:not(:placeholder-shown)+label,.field textarea:focus+label,.field textarea:not(:placeholder-shown)+label,.field.filled label{top:-8px;font-size:.72rem;color:var(--orange)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.field-row{grid-template-columns:1fr}}
.success-state{text-align:center;padding:30px 10px;display:none}
.success-state.show{display:block}
.success-state svg{width:56px;height:56px;stroke:var(--orange);margin-bottom:16px}

/* footer */
footer{background:var(--p900);color:rgba(255,255,255,.6);padding:60px 0 26px}
.foot-grid{display:grid;grid-template-columns:1.1fr 1fr 1.2fr;gap:32px;padding-bottom:30px;border-bottom:1px solid rgba(255,255,255,.08)}
.foot-col h5{color:#fff;font-size:.95rem;font-weight:800;margin-bottom:16px}
.foot-contact{list-style:none;display:flex;flex-direction:column;gap:12px}
.foot-contact li{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(255,255,255,.65)}
.foot-contact svg{width:16px;height:16px;flex-shrink:0;margin-top:3px;color:var(--orange-l)}
.foot-links{display:flex;flex-direction:column;gap:12px}
.foot-links a{font-size:.85rem;color:rgba(255,255,255,.65)}
.foot-links a:hover{color:var(--orange-l)}
.foot-logo-box{display:inline-flex;align-items:center;background:#fff;padding:6px 14px;border-radius:12px;margin-bottom:14px;width:fit-content;max-width:100%;justify-content:start}
.foot-logo-box img{height:32px;margin-bottom:0;display:block}
.foot-desc{font-size:.82rem;color:rgba(255,255,255,.55);max-width:280px;margin-bottom:16px}
.foot-social{display:flex;gap:10px}
.foot-social a{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff;transition:.3s}
.foot-social a:hover{background:var(--orange)}
.foot-social svg{width:16px;height:16px}
.foot-bottom{padding-top:20px;font-size:.78rem;color:rgba(255,255,255,.4);text-align:center}
@media(max-width:760px){.foot-grid{grid-template-columns:1fr;gap:30px}.foot-brand{align-items:flex-start}}

/* floats */
.top-btn{position:fixed;bottom:30px;inset-inline-end:26px;z-index:800;width:46px;height:46px;border-radius:50%;background:var(--p700);color:#fff;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;box-shadow:var(--shadow-md)}
.top-btn.show{opacity:1;pointer-events:auto}
.top-btn svg{width:18px;height:18px}

/* mobile bottom bar */
.mobile-bar{display:none;position:fixed;bottom:0;inset-inline:0;z-index:700;background:rgba(36,17,39,.95);backdrop-filter:blur(14px);padding:10px 14px;gap:10px;border-top:1px solid rgba(255,255,255,.08)}
@media(max-width:760px){.mobile-bar{display:flex}body{padding-bottom:74px}.top-btn{bottom:90px}}
.mobile-bar .btn{flex:1;justify-content:center;padding:13px;font-size:.85rem}
</body>
</html>
